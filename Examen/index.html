<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Cooperativa</h1>
    <form>
        <label for="idOper">Identificador de la Operacion</label>
        <input type="text" id="idOper" name="idOper" required><br>

        <label for="nombreS">Nombre del socio</label>
        <input type="text" id="nombreS" name="nombreS" required><br>

        <label for="apellidoS">Apellidos del socio</label>
        <input type="text" id="apellidoS" name="apellidoS" required><br>

        <label for="producto">Producto añadido</label>
        <input type="text" id="producto" name="producto" required><br>

        <label for="seleccion">Aporte o Toma</label>
        <select id="oper">
            <option id="aporte" value="Aporte">Aporte</option>
            <option id="toma" value="Toma">Toma</option>
        </select><br>

        <label for="cantidad">Cantidad</label>
        <input type="number" id="cantidad" name="cantidad" required><br>
    </form>

    <br>
    <button type="button" id="btnAlta" class="alta">Alta</button>
    <button type="button" id="btnModificar" class="modificar">Modificar</button>
    <button type="button" id="btnTabla" class="tabla">Mostrar Operaciones</button>
    <button type="button" id="btnTablaSospe" class="tablaSospe">Mostrar Operaciones Sospechosas</button>

    <div id="zonaCooper" style="display: none;">
        <h2>Tabla</h2>
        <table  id="tablaCooper" border="1px">
            <thead>
                <tr>
                    <th>Id Operacion</th>
                    <th>Nombre Socio</th>
                    <th>Apellido Socio</th>
                    <th>Producto añadido</th>
                    <th>Aporte o Toma</th>
                    <th>Cantidad</th>
                </tr>
            </thead>
            <tbody>
                
            </tbody>
        </table>
    </div>

    <div id="zonaCooperSospechoso" style="display: none;">
        <h2>Tabla Operaciones Sospechosas</h2>
        <table  id="tablaCooperSospechoso" border="1px">
            <thead>
                <tr>
                    <th>Id Operacion</th>
                    <th>Nombre Socio</th>
                    <th>Apellido Socio</th>
                    <th>Cantidad Tomada</th>
                </tr>
            </thead>
            <tbody>
                
            </tbody>
        </table>
    </div>

    <script src="./js/cooperativa.js"></script>
</body>
</html>
