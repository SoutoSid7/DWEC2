<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../EjExamen/css/style.css">

</head>
<body>
    <h1>Vuelos</h1>
    <form id="formVuelos">
        <label for="codigo">Codigo</label>
        <input type="text" id="codigo" name="codigo">

        <label for="numPlazas">Numero de Plazas</label>
        <input type="number" id="numPlazas" name="numPlazas">

        <label for="imporB">Importe Billete</label>
        <input type="number" id="imporB" name="imporB">

        <button type="button" id="btnAñadir">Añadir</button>
        <button type="button" id="btnModificar">Modificar</button>
        <button type="button" id="btnCalcular">Calcular</button>
    </form>

    <table id="resultado">
        <thead>
            <tr>
                <th>Codigo</th>
                <th>Numero de Plazas</th>
                <th>Importe Billete</th>
            </tr>
        </thead>
        <tbody>
            
        </tbody>
    </table>

    <div id="zonaRentables" style="display:none;">
        <h2>Vuelos Muy Rentables</h2>
        <table id="tableRentable">
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Plazas</th>
                    <th>Importe Billete</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="../EjExamen/js/vuelo.js"></script>
    <script src="../EjExamen/js/vueloMuyRentable.js"></script>    
</body>
</html>
