<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num
        num = prompt("Introduzca un numero: ")   
        num = parseInt(num)

        for(let i = 0; i < num; i++){
            let linea = ""
            for(let j = 0; j < num; j++){
                linea += "*"
            }
            document.write(linea + "<br>")
        }
    </script>
</body>
</html>
