<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let car = prompt("Introduzca el caracter: ")
        function caracter(car){
            /^[A-Za-z]$/
            return /^[A-Za-z]$/.test(car)
        }
        document.write(caracter(car))
    </script>
</body>
</html>
