<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function comparar(){
            let c1 = prompt("Introduce el primer caracter a comparar")
            let c2 = prompt("Introduce el segundo caracter a comparar")

            if(c1 > c2){
                alert(`${c1} es mayor que ${c2}`)
            } else {
                alert(`${c2} es mayor que ${c1}`)
            }
        }
        comparar()
    </script>
</body>
</html>
