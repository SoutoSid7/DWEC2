<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function depurar(){
            let operador = prompt("Introduce el caracter de operacion (+ - x /)")
            
            if(operador !== "+" && operador !== "-" && operador !== "x" && operador !== "/"){
                alert("No es un caracter de operacion valido")
            }
        }   
        depurar()
    </script>
</body>
</html>
