<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Act3_1_6_Mario_Souto</title>
</head>
<body>
    <script>
        function suma(){
            let num1 = prompt("Introduce el primer numero: ");
            num1 = parseInt(num1)
            let num2 = prompt("Introduce el segundo numero: ");
            num2 = parseInt(num2)

            let suma = num1+num2
            document.write(suma)
        }
        suma()
    </script>
</body>
