<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AVILESA - Gestión de líneas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../EjExamen 2/css/lineas.css">
</head>
<body>
<header>
    <h1>Gestión de líneas</h1>
</header>

<main>
    <a href="index.html" class="volver">&larr; Volver a la página principal</a>

    <section>
        <h2>Alta / Baja / Modificación de líneas</h2>

        <form id="formLineas">
            <fieldset>
                <legend>Datos de la línea</legend>

                <label for="numLinea">Número de línea *</label>
                <input type="number" id="numLinea" name="numLinea" min="1" step="1" required>

                <label for="origen">Origen *</label>
                <input type="text" id="origen" name="origen" required>

                <label for="destino">Destino *</label>
                <input type="text" id="destino" name="destino" required>

                <label for="horaSalida">Hora inicial de salida (HH:MM) *</label>
                <input type="time" id="horaSalida" name="horaSalida" required>

                <label for="intervaloLinea">Intervalo entre buses (HH:MM) *</label>
                <input type="text" id="intervaloLinea" name="intervaloLinea" placeholder="HH:MM" required>
            </fieldset>

            <div class="acciones">
                <button type="button" id="btnAlta" class="alta">Alta</button>
                <button type="button" id="btnBaja" class="baja">Baja</button>
                <button type="button" id="btnModificar" class="modificar">Modificar</button>
            </div>
        </form>

        <div class="mensaje" id="mensajeLineas"></div>
    </section>

    <section>
        <h2>Listado de líneas</h2>
        <table  id="tablaLinea">
            <thead>
                <tr>
                    <th>Nº línea</th>
                    <th>Origen</th>
                    <th>Destino</th>
                    <th>Hora salida</th>
                    <th>Intervalo</th>
                </tr>
            </thead>
            <tbody>
                <!-- JavaScript rellenará esto -->
            </tbody>
        </table>
    </section>
</main>

<script src="../EjExamen 2/js/lineas.js"></script>
</body>
</html>
